name: Android CI

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          cache: true

      - name: Generate private build config
        env:
          APP_ENDPOINT: ${{ secrets.APP_ENDPOINT }}
          APP_LINKS_URL_HOST: ${{ vars.APP_LINKS_URL_HOST }}
          APP_LINKS_URL_SCHEME: ${{ vars.APP_LINKS_URL_SCHEME }}
          ANDROID_APPLICATION_ID: ${{ vars.ANDROID_APPLICATION_ID }}
          ANDROID_APPLICATION_NAME: ${{ vars.ANDROID_APPLICATION_NAME }}
          IOS_APPLICATION_ID: ${{ vars.IOS_APPLICATION_ID }}
          IOS_APPLICATION_NAME: ${{ vars.IOS_APPLICATION_NAME }}
          THINGSBOARD_OAUTH2_CALLBACK_URL_SCHEME: ${{ vars.THINGSBOARD_OAUTH2_CALLBACK_URL_SCHEME }}
          THINGSBOARD_ANDROID_APP_SECRET: ${{ secrets.THINGSBOARD_ANDROID_APP_SECRET }}
          THINGSBOARD_IOS_APP_SECRET: ${{ secrets.THINGSBOARD_IOS_APP_SECRET }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const missing = [];
          const required = (name) => {
            const value = process.env[name] || '';
            if (!value) missing.push(name);
            return value;
          };
          const optional = (name, fallback = '') => process.env[name] || fallback;
          const hostFromEndpoint = (endpoint) => {
            try {
              return new URL(endpoint).host;
            } catch {
              return '';
            }
          };

          const endpoint = required('APP_ENDPOINT');
          const config = {
            thingsboardApiEndpoint: endpoint,
            appLinksUrlHost: optional('APP_LINKS_URL_HOST', hostFromEndpoint(endpoint)),
            appLinksUrlScheme: optional('APP_LINKS_URL_SCHEME', 'https'),
            androidApplicationId: optional('ANDROID_APPLICATION_ID', 'io.cortexfield.app'),
            androidApplicationName: optional('ANDROID_APPLICATION_NAME', 'CorteXField'),
            iosApplicationId: optional('IOS_APPLICATION_ID', 'io.cortexfield.app'),
            iosApplicationName: optional('IOS_APPLICATION_NAME', 'CorteXField'),
            thingsboardOAuth2CallbackUrlScheme: optional(
              'THINGSBOARD_OAUTH2_CALLBACK_URL_SCHEME',
              'io.cortexfield.app.auth',
            ),
            thingsboardAndroidAppSecret: required('THINGSBOARD_ANDROID_APP_SECRET'),
            thingsboardIosAppSecret: optional('THINGSBOARD_IOS_APP_SECRET'),
          };

          if (missing.length > 0) {
            console.error(`Missing required GitHub secrets: ${missing.join(', ')}`);
            process.exit(1);
          }

          fs.writeFileSync('configs.json', `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --dart-define-from-file=configs.json
